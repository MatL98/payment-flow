AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: payment-flow-simulator

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Architectures:
      - x86_64
    Environment:
      Variables:
        PAYMENTS_TABLE_NAME: !Ref PaymentsTable
        IDEMPOTENCY_TABLE_NAME: !Ref IdempotencyTable

Resources:
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: v1

  PaymentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  IdempotencyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH

  CreatePaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/createPayment.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PaymentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
      Events:
        CreatePayment:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /payments
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handlers/createPayment.ts
        Minify: false
        Sourcemap: true
        Target: es2022

  InitiatePaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/initiatePayment.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PaymentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
      Events:
        InitiatePayment:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /payments/{id}/initiate
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handlers/initiatePayment.ts
        Minify: false
        Sourcemap: true
        Target: es2022

  GetPaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/getPayment.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PaymentsTable
      Events:
        GetPayment:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /payments/{id}
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handlers/getPayment.ts
        Minify: false
        Sourcemap: true
        Target: es2022

  WebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/webhook.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PaymentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
      Events:
        Webhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /webhook
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handlers/webhook.ts
        Minify: false
        Sourcemap: true
        Target: es2022

Outputs:
  ApiBaseUrl:
    Description: Base URL for the deployed HTTP API
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/v1"
